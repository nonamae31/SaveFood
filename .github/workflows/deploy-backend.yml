name: Deploy Backend to SmarterASP.NET

on:
  push:
    branches:
      - main
    paths:
      - 'SaveFoodBackend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore SaveFoodBackend/SaveFoodBackend.csproj

    - name: Build and Publish
      run: dotnet publish SaveFoodBackend/SaveFoodBackend.csproj -c Release -o ./publish

    - name: Take Site Offline
      run: |
        echo "<html><body><h1>Website is being updated. Please check back in a minute.</h1></body></html>" > app_offline.htm
        curl -T app_offline.htm ftp://${{ secrets.FTP_SERVER }}/site1/app_offline.htm --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /site1/

    - name: Bring Site Online
      if: always()
      run: |
        curl -Q "-DELE /site1/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}

